<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitZone | קמפיין הרשמה</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Heebo', Arial, sans-serif; margin: 0; background: #0b0f14; color: #fff; text-align: center; }
  .wrap { padding: 70px 20px; max-width: 600px; margin: 0 auto; }
  .tag { display: inline-block; background: #ff5c39; padding: 6px 16px; border-radius: 20px; font-size: 0.85em; font-weight: 700; margin-bottom: 20px; }
  h1 { font-size: 2.4em; margin: 0 0 16px; line-height: 1.3; }
  p.sub { color: #b6bec7; margin: 0 0 30px; font-size: 1.1em; }
  .price-box { background: #161c24; border-radius: 16px; padding: 30px; margin-bottom: 30px; }
  .price { font-size: 2.5em; font-weight: 800; color: #ff5c39; }
  .price span { font-size: 0.4em; color: #b6bec7; }
  form { display: flex; flex-direction: column; gap: 12px; max-width: 320px; margin: 0 auto; }
  input { padding: 14px; border-radius: 8px; border: none; font-size: 1em; }
  button { padding: 14px; border-radius: 8px; border: none; background: #ff5c39; color: #fff; font-weight: 700; font-size: 1.05em; cursor: pointer; }
  .countdown { margin-top: 24px; color: #b6bec7; font-size: 0.9em; }
</style>
</head>
<body>
  <div class="wrap">
    <span class="tag">🔥 מבצע השקה — 48 שעות בלבד</span>
    <h1>הצטרפו ל-FitZone וקבלו חודש ראשון ב-₪1</h1>
    <p class="sub">מנוי חודשי לכל המכונים ברשת, בלי התחייבות</p>
    <div class="price-box">
      <div class="price">₪1<span> לחודש הראשון</span></div>
    </div>
    <form onsubmit="return false">
      <input type="text" placeholder="שם מלא" required>
      <input type="tel" placeholder="טלפון" required>
      <button type="submit">אני רוצה להצטרף</button>
    </form>
    <p class="countdown">⏱ ההצעה בתוקף לזמן מוגבל</p>
  </div>
</body>
</html>
