<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לה־בוטיק | חנות אופנה</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Heebo', Arial, sans-serif; margin: 0; background: #fffaf6; color: #2b2420; }
  header { background: #2b2420; color: #fff; padding: 24px 6%; display: flex; justify-content: space-between; align-items: center; }
  header h1 { margin: 0; font-size: 1.4em; letter-spacing: 1px; }
  .cart { background: #d8a25e; color: #2b2420; padding: 8px 16px; border-radius: 20px; font-weight: 700; font-size: 0.9em; }
  .hero { text-align: center; padding: 70px 20px; background: linear-gradient(135deg, #f3e3d3, #fffaf6); }
  .hero h2 { font-size: 2.2em; margin: 0 0 10px; }
  .hero p { color: #6b5e52; }
  .badge { display: inline-block; background: #d8a25e; color: #2b2420; padding: 6px 16px; border-radius: 20px; font-size: 0.85em; margin-top: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; padding: 50px 20px; }
  .product { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 6px 16px rgba(0,0,0,0.06); transition: transform 0.2s; }
  .product:hover { transform: translateY(-4px); }
  .thumb { height: 140px; background: linear-gradient(135deg, #d8a25e, #f3e3d3); }
  .product h3 { font-size: 1em; margin: 14px 14px 4px; }
  .price { margin: 0 14px 14px; color: #d8a25e; font-weight: 700; }
  footer { text-align: center; padding: 24px; color: #998d80; font-size: 0.9em; }
</style>
</head>
<body>
  <header>
    <h1>לה־בוטיק</h1>
    <div class="cart">🛍 עגלה (0)</div>
  </header>
  <section class="hero">
    <h2>קולקציית הסתיו החדשה</h2>
    <p>עיצוב נקי, איכות גבוהה, משלוח מהיר לכל הארץ</p>
    <span class="badge">משלוח חינם מעל ₪200</span>
  </section>
  <div class="grid">
    <div class="product"><div class="thumb"></div><h3>שמלת מידי</h3><p class="price">₪229</p></div>
    <div class="product"><div class="thumb"></div><h3>חולצת לינן</h3><p class="price">₪149</p></div>
    <div class="product"><div class="thumb"></div><h3>מכנס גזרה רחבה</h3><p class="price">₪189</p></div>
    <div class="product"><div class="thumb"></div><h3>מעיל צמר</h3><p class="price">₪349</p></div>
  </div>
  <footer>דמו לדוגמה — נבנה ע"י PixelCraft</footer>
</body>
</html>
