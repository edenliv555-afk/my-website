<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>האתר שלי</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>שם העסק שלך</h1>
    <p>תיאור קצר על השירות שאתה מציע</p>
  </header>

  <section id="portfolio">
    <h2>תיק עבודות</h2>
    <p>כאן יוצגו דוגמאות מהעבודות שלך.</p>
  </section>

  <section id="testimonials">
    <h2>המלצות</h2>
    <p>כאן יוצגו המלצות מלקוחות מרוצים.</p>
  </section>

  <section id="contact">
    <h2>צור קשר</h2>
    <form>
      <input type="text" placeholder="שם מלא" required>
      <input type="email" placeholder="אימייל" required>
      <textarea placeholder="הודעה" required></textarea>
      <button type="submit">שלח</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 שם העסק שלך</p>
  </footer>
</body>
</html>
